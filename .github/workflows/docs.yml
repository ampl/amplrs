name: Docs

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Sphinx dependencies
        run: pip install -r docs/requirements.txt

      # -W turns warnings (e.g. broken :ref:s) into build failures.
      - name: Build HTML docs
        run: python -m sphinx -M html docs/source docs/build -W --keep-going

      - name: Upload HTML docs
        uses: actions/upload-artifact@v4
        with:
          name: amplrs-docs
          path: docs/build
          if-no-files-found: error
