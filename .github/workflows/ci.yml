name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  BUNDLES_URL: 'https://portal.ampl.com/dl/amplce/'
  LINUX64_BUNDLE_NAME: 'ampl.linux64.tgz'
  MACOS64_BUNDLE_NAME: 'ampl.macos64.tgz'
  MSWIN64_BUNDLE_NAME: 'ampl.mswin64.zip'

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 is Intel (x86_64); macos-latest/14+ is Apple Silicon and
        # the vendored AMPL C API we download has no arm64 macOS build.
        os: [ubuntu-latest, windows-latest, macos-13]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Point bindgen at LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Select AMPL bundle for this OS
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux) echo "AMPL_BUNDLE_NAME=$LINUX64_BUNDLE_NAME" >> "$GITHUB_ENV" ;;
            macOS) echo "AMPL_BUNDLE_NAME=$MACOS64_BUNDLE_NAME" >> "$GITHUB_ENV" ;;
            Windows) echo "AMPL_BUNDLE_NAME=$MSWIN64_BUNDLE_NAME" >> "$GITHUB_ENV" ;;
          esac

      - name: Download and activate AMPL
        shell: bash
        env:
          AMPL_LICENSE_UUID: ${{ secrets.AMPL_LICENSE_UUID }}
        run: ./dev/download-ampl.sh "${BUNDLES_URL}${AMPL_BUNDLE_NAME}"

      - name: Add AMPL to PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/ampl" >> "$GITHUB_PATH"

      # cargo build --all-targets compiles the library, examples, and tests
      # (catching any compile-time regression).
      - name: Build (lib, examples, tests)
        run: cargo build --all-targets --verbose

      - name: Test
        run: cargo test --verbose
